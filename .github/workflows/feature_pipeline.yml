name: Feature Pipeline (Hourly)

on:
  schedule:
    - cron: "0 * * * *"   # Every hour, on the hour
  workflow_dispatch:       # Allow manual trigger
    inputs:
      city:
        description: "City to run pipeline for (or 'all')"
        required: false
        default: "all"

jobs:
  run-feature-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore feature store cache
        uses: actions/cache@v4
        with:
          path: data/processed
          key: feature-store-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            feature-store-${{ runner.os }}-

      - name: Run feature pipeline
        env:
          AQICN_API_TOKEN:    ${{ secrets.AQICN_API_TOKEN }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          HOPSWORKS_API_KEY:  ${{ secrets.HOPSWORKS_API_KEY }}
          HOPSWORKS_PROJECT:  ${{ secrets.HOPSWORKS_PROJECT }}
        run: |
          CITY="${{ github.event.inputs.city || 'all' }}"
          python scripts/run_feature_pipeline.py --city "$CITY"

      - name: Save feature store cache
        uses: actions/cache@v4
        with:
          path: data/processed
          key: feature-store-${{ runner.os }}-${{ github.run_id }}

      - name: Upload feature store artifact
        uses: actions/upload-artifact@v4
        with:
          name: feature-store-${{ github.run_number }}
          path: data/processed/
          retention-days: 7
